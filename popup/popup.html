<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CV Tailor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 380px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #1a1a2e;
      background: #f8f9ff;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header h1 { font-size: 15px; font-weight: 600; letter-spacing: 0.3px; }
    .header a { color: rgba(255,255,255,0.8); font-size: 11px; text-decoration: none; }
    .header a:hover { color: white; }

    .job-info {
      background: white;
      border-bottom: 1px solid #e8eaf0;
      padding: 12px 16px;
    }
    .job-title {
      font-weight: 600;
      font-size: 13px;
      color: #1a1a2e;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .job-meta { font-size: 11px; color: #888; }

    .main { padding: 14px 16px; }

    .btn {
      display: block;
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
    .btn-primary:hover:not(:disabled) { opacity: 0.9; }
    .btn-secondary {
      background: white;
      border: 1px solid #d0d3e0;
      color: #444;
      margin-top: 8px;
    }
    .btn-secondary:hover:not(:disabled) { background: #f0f2ff; }

    .status {
      text-align: center;
      font-size: 12px;
      color: #888;
      padding: 8px 0;
      display: none;
    }
    .status.visible { display: block; }
    .status.error { color: #e53e3e; }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid #c4b5fd;
      border-top-color: #7c3aed;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .results { display: none; margin-top: 14px; }
    .results.visible { display: block; }

    .section { margin-bottom: 12px; }
    .section-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #764ba2;
      margin-bottom: 6px;
    }
    .section-text {
      background: white;
      border: 1px solid #e8eaf0;
      border-radius: 6px;
      padding: 10px;
      font-size: 12px;
      line-height: 1.5;
      color: #333;
    }

    .skills-list {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }
    .skill-chip {
      background: #f0f2ff;
      border: 1px solid #c4b5fd;
      border-radius: 12px;
      padding: 3px 9px;
      font-size: 11px;
      color: #5b21b6;
    }

    .exp-list { list-style: none; padding: 0; }
    .exp-list li {
      background: white;
      border: 1px solid #e8eaf0;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 12px;
      color: #333;
      line-height: 1.4;
      margin-bottom: 5px;
    }
    .exp-list li::before { content: '▸ '; color: #764ba2; font-size: 10px; }

    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .saved-label {
      font-size: 11px;
      color: #999;
    }
    .btn-reset {
      background: none;
      border: none;
      font-size: 11px;
      color: #888;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
    }
    .btn-reset:hover { background: #f0f2ff; color: #764ba2; }

    .actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    .actions .btn {
      flex: 1;
      padding: 8px;
      font-size: 12px;
    }

    .no-profile {
      text-align: center;
      padding: 20px;
      color: #888;
      font-size: 12px;
      line-height: 1.6;
    }
    .no-profile a { color: #667eea; text-decoration: none; font-weight: 600; }

    .mode-toggle {
      display: flex;
      background: #f0f2ff;
      border-radius: 8px;
      padding: 3px;
      margin-bottom: 10px;
      gap: 3px;
    }
    .mode-btn {
      flex: 1;
      padding: 7px 6px;
      border: none;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      background: none;
      color: #888;
      transition: background 0.15s, color 0.15s;
      line-height: 1.3;
    }
    .mode-btn.active {
      background: white;
      color: #764ba2;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }
    .mode-hint {
      font-size: 11px;
      color: #999;
      margin-bottom: 10px;
      min-height: 28px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>CV Tailor</h1>
    <a href="#" id="openOptions">⚙ Settings</a>
  </div>

  <div id="noProfile" class="no-profile" style="display:none">
    <p>Set up your profile first to start generating tailored CVs.</p>
    <br>
    <a href="#" id="openOptionsFromEmpty">Open Settings →</a>
  </div>

  <div id="mainContent">
    <div class="job-info">
      <div class="job-title" id="jobTitle">Detecting job…</div>
      <div class="job-meta" id="jobMeta">Reading page</div>
    </div>

    <div class="main">
      <div id="generateSection">
        <div class="mode-toggle">
          <button class="mode-btn active" data-mode="optimize">ATS Optimize</button>
          <button class="mode-btn" data-mode="scratch">From Scratch</button>
        </div>
        <p class="mode-hint" id="modeHint">Keeps your real experience — rewrites keywords to pass ATS filters.</p>
        <button class="btn btn-primary" id="generateBtn">Generate Tailored CV</button>
      </div>
      <div class="status" id="status"></div>

      <div class="results" id="results">
        <div class="result-header">
          <span class="saved-label" id="savedLabel"></span>
          <button class="btn-reset" id="resetBtn">↺ Start over</button>
        </div>
        <div class="section">
          <div class="section-label">Summary</div>
          <div class="section-text" id="resSummary"></div>
        </div>
        <div class="section">
          <div class="section-label">Skills</div>
          <div class="skills-list" id="resSkills"></div>
        </div>
        <div class="section">
          <div class="section-label">Experience Bullets</div>
          <ul class="exp-list" id="resExperience"></ul>
        </div>
        <div class="section">
          <div class="section-label">Cover Letter</div>
          <div class="section-text" id="resCover"></div>
        </div>

        <div class="actions">
          <button class="btn btn-secondary" id="fillFormBtn">Fill Form</button>
          <button class="btn btn-secondary" id="previewBtn">Preview CV</button>
          <button class="btn btn-secondary" id="coverLetterBtn">Cover Letter</button>
        </div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
