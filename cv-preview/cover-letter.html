<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Cover Letter</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #e0e0e0;
      padding: 20px;
      font-family: -apple-system, sans-serif;
    }

    .toolbar {
      background: #333;
      color: white;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    .toolbar span { font-size: 13px; }
    .toolbar button {
      background: #667eea;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 8px 20px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .toolbar button:hover { background: #764ba2; }

    .page {
      background: white;
      width: 210mm;
      min-height: 297mm;
      margin: 0 auto;
      padding: 18mm 18mm 20mm;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      font-family: 'Georgia', 'Times New Roman', serif;
      font-size: 11pt;
      color: #111;
      line-height: 1.5;
    }

    .cl-header { text-align: center; margin-bottom: 10px; }
    .cl-name { font-size: 20pt; font-weight: 700; }
    .cl-location { font-size: 10pt; margin-top: 3px; color: #333; }
    .cl-contact { font-size: 10pt; color: #333; margin-top: 2px; }
    .cl-rule { border: none; border-top: 2px solid #111; margin: 10px 0 28px; }

    .cl-body { margin-bottom: 28px; }
    .cl-greeting { margin-bottom: 18px; }
    .cl-para { margin-bottom: 14px; text-align: justify; }

    .cl-closing { }
    .cl-sincerely { margin-bottom: 48px; }
    .cl-signature { margin-bottom: 4px; }
    .cl-enclosure { }

    @media print {
      body { background: white; padding: 0; }
      .toolbar { display: none; }
      .page { box-shadow: none; margin: 0; width: 100%; }
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <span id="toolbarTitle">Cover Letter</span>
    <span style="font-size:12px;opacity:0.6">In the print dialog, set Destination to <strong>Save as PDF</strong></span>
    <button id="printBtn">Save as PDF</button>
  </div>

  <div class="page" id="clPage">
    <p style="color:#888;text-align:center;padding:40px">Loading cover letter…</p>
  </div>

  <script src="cover-letter.js"></script>
</body>
</html>
